<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Memory Cards</title>

    <meta name="description" content="Memory Cards arcade game start screen." />

    <style>
        * {
            box-sizing: border-box;
        }
        
        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #9b693d;
        }
        
        button {
            font: inherit;
            border: 0;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        button:focus-visible,
        a:focus-visible {
            outline: 4px solid rgba(255, 255, 255, 0.9);
            outline-offset: 4px;
        }
        
        .hidden {
            display: none !important;
        }
        
        .mc-home {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: grid;
            place-items: center;
            color: #ffffff;
            background: linear-gradient(rgba(129, 76, 37, 0.26), rgba(129, 76, 37, 0.26)), repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.04) 0 8px, transparent 8px 72px), repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 8px, transparent 8px 90px), linear-gradient(135deg, #8e5731, #c08348 45%, #936234);
        }
        
        .mc-home::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 45%, rgba(255, 238, 168, 0.28), transparent 32%), radial-gradient(circle at 16% 84%, rgba(48, 177, 255, 0.18), transparent 19%), radial-gradient(circle at 84% 78%, rgba(255, 209, 105, 0.18), transparent 18%);
            pointer-events: none;
        }
        
        .mc-pencil {
            position: absolute;
            left: -20px;
            height: 34px;
            width: 430px;
            border-radius: 999px;
            transform-origin: left center;
            filter: drop-shadow(0 10px 8px rgba(0, 0, 0, 0.18));
        }
        
        .mc-pencil::before {
            content: "";
            position: absolute;
            right: -48px;
            top: 0;
            width: 78px;
            height: 34px;
            clip-path: polygon(0 0, 100% 50%, 0 100%);
            background: linear-gradient(90deg, #f3d49b 0 58%, #f6ead0 58% 78%, currentColor 78%);
        }
        
        .mc-pencil.green {
            top: -8px;
            background: linear-gradient(#47ef50, #0ba72b);
            color: #30d955;
            transform: rotate(4deg);
        }
        
        .mc-pencil.pink {
            top: 82px;
            background: linear-gradient(#ff5faf, #e61f82);
            color: #ff4ca1;
            transform: rotate(11deg);
        }
        
        .mc-flower {
            position: absolute;
            width: 168px;
            height: 168px;
            filter: drop-shadow(0 12px 8px rgba(0, 0, 0, 0.28));
        }
        
        .mc-flower::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #ffd84e 0 16%, transparent 17%), radial-gradient(ellipse at 50% 12%, #1fb8f4 0 22%, #0069c9 23% 39%, transparent 40%), radial-gradient(ellipse at 88% 42%, #1fb8f4 0 22%, #0069c9 23% 39%, transparent 40%), radial-gradient(ellipse at 72% 88%, #1fb8f4 0 22%, #0069c9 23% 39%, transparent 40%), radial-gradient(ellipse at 28% 88%, #1fb8f4 0 22%, #0069c9 23% 39%, transparent 40%), radial-gradient(ellipse at 12% 42%, #1fb8f4 0 22%, #0069c9 23% 39%, transparent 40%);
            border-radius: 50%;
        }
        
        .mc-flower.big {
            left: 58px;
            bottom: 70px;
            width: 190px;
            height: 190px;
        }
        
        .mc-flower.small-left {
            left: 250px;
            bottom: 66px;
            width: 140px;
            height: 140px;
        }
        
        .mc-flower.top-right {
            right: 70px;
            top: 42px;
            width: 174px;
            height: 174px;
        }
        
        .mc-petal {
            position: absolute;
            right: 205px;
            top: 256px;
            width: 74px;
            height: 58px;
            background: radial-gradient(ellipse at 50% 40%, #21bdf3 0 42%, #0070cc 65%);
            border-radius: 62% 38% 70% 30% / 50% 45% 55% 50%;
            transform: rotate(-24deg);
            filter: drop-shadow(0 8px 5px rgba(0, 0, 0, 0.2));
        }
        
        .mc-cookie {
            position: absolute;
            right: 84px;
            bottom: 74px;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle at 34% 30%, #5d301d 0 12px, transparent 13px), radial-gradient(circle at 68% 28%, #5d301d 0 12px, transparent 13px), radial-gradient(circle at 58% 63%, #5d301d 0 13px, transparent 14px), radial-gradient(circle at 80% 58%, #5d301d 0 11px, transparent 12px), radial-gradient(circle at 34% 74%, #5d301d 0 11px, transparent 12px), linear-gradient(135deg, #f1c25d, #cb7a25);
            box-shadow: inset 16px 18px 0 rgba(255, 255, 255, 0.14), inset -18px -20px 0 rgba(107, 52, 16, 0.15), 0 18px 28px rgba(0, 0, 0, 0.28);
        }
        
        .mc-cookie::before {
            content: "";
            position: absolute;
            left: -10px;
            top: -8px;
            width: 132px;
            height: 132px;
            border-radius: 50%;
            background: #9b693d;
            box-shadow: inset -12px -10px 0 rgba(80, 44, 20, 0.16);
        }
        
        .mc-content {
            position: relative;
            z-index: 3;
            width: min(620px, 88vw);
            display: grid;
            justify-items: center;
            text-align: center;
            transform: translateY(-10px);
        }
        
        .mc-title {
            margin: 0 0 40px;
            color: #0875ba;
            font-size: clamp(64px, 8vw, 102px);
            line-height: 0.86;
            font-weight: 1000;
            letter-spacing: -4px;
            text-transform: uppercase;
            text-shadow: 4px 4px 0 #ffffff, -4px 4px 0 #ffffff, 4px -4px 0 #ffffff, -4px -4px 0 #ffffff, 0 8px 0 rgba(66, 42, 24, 0.38), 0 15px 22px rgba(0, 0, 0, 0.22);
        }
        
        .mc-main-btn,
        .mc-relax-btn {
            min-width: min(425px, 78vw);
            min-height: 68px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 24px;
            font-weight: 1000;
            text-shadow: 2px 2px 0 rgba(92, 47, 20, 0.82), -2px 2px 0 rgba(92, 47, 20, 0.82), 2px -2px 0 rgba(92, 47, 20, 0.82), -2px -2px 0 rgba(92, 47, 20, 0.82);
            box-shadow: inset 0 3px 0 rgba(255, 255, 255, 0.34), 0 6px 0 rgba(126, 64, 11, 0.7), 0 13px 18px rgba(0, 0, 0, 0.22);
            transition: transform 150ms ease, filter 150ms ease, box-shadow 150ms ease;
        }
        
        .mc-main-btn {
            background: linear-gradient(#ffd969, #ffb13d);
        }
        
        .mc-relax-btn {
            min-width: min(350px, 70vw);
            min-height: 60px;
            background: linear-gradient(#f7d27d, #e2ab43);
            font-size: 22px;
        }
        
        .mc-main-btn:hover,
        .mc-relax-btn:hover,
        .mc-howto:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        
        .mc-main-btn:active,
        .mc-relax-btn:active,
        .mc-howto:active {
            transform: translateY(2px);
            box-shadow: inset 0 3px 0 rgba(255, 255, 255, 0.24), 0 3px 0 rgba(126, 64, 11, 0.7), 0 8px 12px rgba(0, 0, 0, 0.2);
        }
        
        .mc-or {
            width: min(330px, 70vw);
            margin: 26px 0 22px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            color: #ffffff;
            font-size: 19px;
            font-weight: 1000;
            text-shadow: 0 2px 0 rgba(80, 39, 14, 0.72);
        }
        
        .mc-or::before,
        .mc-or::after {
            content: "";
            height: 2px;
            background: rgba(255, 255, 255, 0.42);
            box-shadow: 0 1px 0 rgba(92, 48, 22, 0.35);
        }
        
        .mc-story-badge {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8;
            max-width: min(760px, calc(100vw - 28px));
            padding: 12px 18px;
            border-radius: 999px;
            background: rgba(38, 27, 72, 0.72);
            border: 2px solid rgba(255, 255, 255, 0.18);
            color: #fff7df;
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.22);
            font-size: 16px;
            font-weight: 900;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        
        .mc-howto {
            position: absolute;
            left: 50%;
            bottom: 36px;
            transform: translateX(-50%);
            z-index: 4;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: transparent;
            color: #fff3d6;
            font-size: 18px;
            font-weight: 1000;
            text-shadow: 0 3px 0 rgba(81, 38, 15, 0.55);
        }
        
        .mc-howto span {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 3px solid #fff3d6;
            display: grid;
            place-items: center;
            font-size: 18px;
            line-height: 1;
        }
        
        .mc-help-modal {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: grid;
            place-items: center;
            padding: 24px;
            background: rgba(53, 28, 13, 0.55);
            backdrop-filter: blur(6px);
        }
        
        .mc-help-modal.hidden {
            display: none;
        }
        
        .mc-help-card {
            width: min(470px, 92vw);
            border-radius: 28px;
            background: linear-gradient(#f3c66a, #d9882c);
            padding: 34px 28px 28px;
            box-shadow: inset 0 3px 0 rgba(255, 255, 255, 0.3), 0 18px 30px rgba(0, 0, 0, 0.32);
            text-align: center;
            color: #ffffff;
        }
        
        .mc-help-card h2 {
            margin: 0 0 14px;
            font-size: 38px;
            font-weight: 1000;
            text-shadow: 2px 2px 0 rgba(98, 48, 16, 0.7), -2px 2px 0 rgba(98, 48, 16, 0.7), 2px -2px 0 rgba(98, 48, 16, 0.7), -2px -2px 0 rgba(98, 48, 16, 0.7);
        }
        
        .mc-help-card p {
            margin: 0;
            color: #fff8df;
            font-size: 20px;
            line-height: 1.45;
            font-weight: 800;
            text-shadow: 0 2px 0 rgba(98, 48, 16, 0.45);
        }
        
        .mc-help-close {
            margin-top: 24px;
            min-width: 220px;
            min-height: 54px;
            border-radius: 14px;
            background: linear-gradient(#fff8dc, #e8cf84);
            color: #746242;
            font-size: 20px;
            font-weight: 1000;
            box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.42), 0 5px 0 #aa8e52, 0 10px 14px rgba(0, 0, 0, 0.22);
        }
        
        @media (max-width: 900px) {
            .mc-cookie {
                width: 170px;
                height: 170px;
                right: 28px;
                bottom: 80px;
            }
            .mc-flower.top-right {
                right: 24px;
                top: 36px;
                width: 130px;
                height: 130px;
            }
            .mc-flower.big {
                left: 28px;
                bottom: 58px;
                width: 140px;
                height: 140px;
            }
            .mc-flower.small-left {
                left: 140px;
                bottom: 54px;
                width: 104px;
                height: 104px;
            }
            .mc-pencil {
                width: 330px;
            }
            .mc-content {
                transform: translateY(-22px);
            }
        }
        
        @media (max-width: 620px) {
            .mc-title {
                margin-bottom: 34px;
                letter-spacing: -2px;
            }
            .mc-main-btn {
                min-height: 62px;
                font-size: 21px;
            }
            .mc-relax-btn {
                min-height: 56px;
                font-size: 20px;
            }
            .mc-cookie,
            .mc-flower.big,
            .mc-flower.small-left,
            .mc-flower.top-right,
            .mc-petal {
                opacity: 0.75;
                scale: 0.8;
            }
            .mc-story-badge {
                top: 12px;
                font-size: 13px;
                padding: 10px 14px;
            }
        }
    </style>
</head>

<body>
    <main class="mc-home">
        <div class="mc-story-badge hidden" id="storyBadge">
            Story Mode • Complete this memory challenge to continue.
        </div>

        <div class="mc-pencil green" aria-hidden="true"></div>
        <div class="mc-pencil pink" aria-hidden="true"></div>

        <div class="mc-flower top-right" aria-hidden="true"></div>
        <div class="mc-petal" aria-hidden="true"></div>

        <div class="mc-flower big" aria-hidden="true"></div>
        <div class="mc-flower small-left" aria-hidden="true"></div>

        <div class="mc-cookie" aria-hidden="true"></div>

        <section class="mc-content" aria-label="Memory Cards menu">
            <h1 class="mc-title">
                Memory<br /> Cards
            </h1>

            <button class="mc-main-btn" id="btnStart" type="button">
                Start Game
            </button>

            <div class="mc-or" id="orDivider">OR</div>

            <button class="mc-relax-btn" id="btnRelax" type="button">
                🏠 Back Home
            </button>
        </section>

        <button class="mc-howto" id="btnHowTo" type="button">
            <span>?</span>
            How to play
        </button>

        <div class="mc-help-modal hidden" id="helpModal" aria-hidden="true">
            <div class="mc-help-card" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
                <h2 id="helpTitle">How to play</h2>

                <p>
                    Flip two cards at a time. If the pictures match, they disappear. Match all pairs to complete the level and earn stars.
                </p>

                <button class="mc-help-close" id="btnHelpClose" type="button">
                    Got it!
                </button>
            </div>
        </div>
    </main>

    <script>
        (function() {
            "use strict";

            var btnStart = document.getElementById("btnStart");
            var btnRelax = document.getElementById("btnRelax");
            var btnHowTo = document.getElementById("btnHowTo");
            var helpModal = document.getElementById("helpModal");
            var btnHelpClose = document.getElementById("btnHelpClose");
            var storyBadge = document.getElementById("storyBadge");
            var orDivider = document.getElementById("orDivider");

            function getParams() {
                try {
                    return new URLSearchParams(window.location.search || "");
                } catch (error) {
                    return new URLSearchParams("");
                }
            }

            function isStoryMode() {
                var params = getParams();

                return params.get("story") === "1" ||
                    String(params.get("mode") || "").toLowerCase() === "story";
            }

            function safeStoryTestId(raw) {
                return String(raw || "memory_cards_story_test")
                    .trim()
                    .toLowerCase()
                    .replace(/\s+/g, "_")
                    .replace(/[^a-z0-9_-]/g, "");
            }

            function safeReturnUrl(raw) {
                raw = raw || "../../story.html";

                if (/^(https?:)?\/\//i.test(raw)) {
                    return "../../story.html";
                }

                if (/^javascript:/i.test(raw)) {
                    return "../../story.html";
                }

                return raw;
            }

            function getStoryGameUrl() {
                var params = getParams();

                var story = isStoryMode();
                var level = params.get("level") || "1";

                if (!story) {
                    return "levels.html";
                }

                var testId = safeStoryTestId(params.get("test"));
                var returnUrl = safeReturnUrl(params.get("return") || "../../story.html");
                var autoReturn = params.get("autoReturn");

                var url =
                    "game.html?story=1" +
                    "&test=" + encodeURIComponent(testId) +
                    "&level=" + encodeURIComponent(level) +
                    "&return=" + encodeURIComponent(returnUrl);

                if (autoReturn !== null) {
                    url += "&autoReturn=" + encodeURIComponent(autoReturn);
                }

                return url;
            }

            function getBackUrl() {
                var params = getParams();

                if (isStoryMode()) {
                    return safeReturnUrl(params.get("return") || "../../story.html");
                }

                return "../../index.html";
            }

            function applyStoryModeUi() {
                if (!isStoryMode()) return;

                if (storyBadge) {
                    storyBadge.classList.remove("hidden");
                }

                if (btnStart) {
                    btnStart.textContent = "Start Story Challenge";
                }

                if (btnRelax) {
                    btnRelax.textContent = "← Back to Story";
                }

                if (orDivider) {
                    orDivider.textContent = "OR";
                }
            }

            function playClick() {
                try {
                    var muted = localStorage.getItem("mc_sound_muted") === "1";
                    if (muted) return;

                    var AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContextClass) return;

                    var ctx = new AudioContextClass();
                    var osc = ctx.createOscillator();
                    var gain = ctx.createGain();

                    var start = ctx.currentTime;
                    var end = start + 0.07;

                    osc.type = "triangle";
                    osc.frequency.setValueAtTime(520, start);

                    gain.gain.setValueAtTime(0.0001, start);
                    gain.gain.exponentialRampToValueAtTime(0.025, start + 0.01);
                    gain.gain.exponentialRampToValueAtTime(0.0001, end);

                    osc.connect(gain);
                    gain.connect(ctx.destination);

                    osc.start(start);
                    osc.stop(end + 0.03);
                } catch (error) {
                    // Ignore audio errors.
                }
            }

            if (btnStart) {
                btnStart.addEventListener("click", function() {
                    playClick();
                    window.location.href = getStoryGameUrl();
                });
            }

            if (btnRelax) {
                btnRelax.addEventListener("click", function() {
                    playClick();
                    window.location.href = getBackUrl();
                });
            }

            if (btnHowTo) {
                btnHowTo.addEventListener("click", function() {
                    playClick();

                    if (helpModal) {
                        helpModal.classList.remove("hidden");
                        helpModal.setAttribute("aria-hidden", "false");
                    }
                });
            }

            if (btnHelpClose) {
                btnHelpClose.addEventListener("click", function() {
                    playClick();

                    if (helpModal) {
                        helpModal.classList.add("hidden");
                        helpModal.setAttribute("aria-hidden", "true");
                    }
                });
            }

            document.addEventListener("keydown", function(event) {
                if (event.key === "Escape" && helpModal && !helpModal.classList.contains("hidden")) {
                    helpModal.classList.add("hidden");
                    helpModal.setAttribute("aria-hidden", "true");
                }
            });

            applyStoryModeUi();
        })();
    </script>
    <script src="../../js/app.js"></script>
</body>

</html>
